name: Final Deployment Assessment

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # المرحلة الأولى: التحقق (مبنية على Lab-02) + فحص الأمان (Trivy)
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Run Python Health Check
        run: |
          # استبدلي هذا بالأمر الفعلي للتست الخاص بكِ
          echo "Running Python code checks..."

      # إضافة Trivy Scan المطلوبة (فحص ملفات النظام والـ OS)
      - name: Run Trivy FS Scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'table'
          exit-code: '1' # يوقف الـ pipeline لو لقى ثغرات خطيرة
          severity: 'CRITICAL,HIGH'

  # المرحلة الثانية: بناء الصورة ورفعها (مبنية على Lab-03 و Docker Hub)
  build-and-push:
    needs: verify
    runs-on: ubuntu-latest
    if: github.event_name == 'push' # يشتغل فقط عند الـ Merge أو الـ Push الفعلي
    steps:
      - uses: actions/checkout@v4

      # توليد الـ Tag المطلوب (التاريخ + رقم الـ Run)
      - name: Generate Image Tag
        run: echo "IMAGE_TAG=$(date +'%Y-%m-%d')-${{ github.run_id }}" >> $GITHUB_ENV

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/tiny-health-app:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/tiny-health-app:${{ env.IMAGE_TAG }}

  # المرحلة الثالثة: النشر على السيرفر (مبنية على Lab-04 و SSH)
  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to VM via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          script: |
            # مسح أي حاوية قديمة بنفس الاسم
            docker stop tiny-health-app || true
            docker rm tiny-health-app || true
            
            # سحب الصورة الجديدة وتشغيلها
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/tiny-health-app:latest
            docker run -d --name tiny-health-app -p 8000:8000 ${{ secrets.DOCKERHUB_USERNAME }}/tiny-health-app:latest

  # المرحلة الرابعة: التأكد من عمل التطبيق (Validation)
  validate:
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - name: Smoke Test Endpoints
        run: |
          sleep 10 # انتظار بدء التشغيل
          curl -f http://${{ secrets.VM_HOST }}:8000/health
          curl -f http://${{ secrets.VM_HOST }}:8000/version
          curl -f http://${{ secrets.VM_HOST }}:8000/status